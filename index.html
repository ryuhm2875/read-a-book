<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>독서 일지 — 감정을 할인가에 판매합니다</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1714;
    --ink-soft: #3d3830;
    --ink-muted: #7a7268;
    --paper: #f7f4ef;
    --paper-warm: #efe9e0;
    --paper-dark: #e4ddd2;
    --accent: #8b4513;
    --accent-light: #c4763a;
    --accent-pale: #f0e6d8;
    --gold: #b8965a;
    --gold-light: #d4b483;
    --white: #fdfaf6;
    --section-done: #4a7c59;
    --section-done-pale: #e8f2eb;
    --shadow: 0 4px 24px rgba(26,23,20,0.10);
    --shadow-lg: 0 8px 48px rgba(26,23,20,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── 로그인 화면 ── */
  #loginScreen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(160deg, #1a1714 0%, #2d2620 50%, #3d3020 100%);
    padding: 24px;
  }

  .login-card {
    background: var(--white);
    border-radius: 4px;
    padding: 56px 48px;
    width: 100%;
    max-width: 420px;
    box-shadow: var(--shadow-lg);
    position: relative;
    overflow: hidden;
  }

  .login-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--accent), var(--gold));
  }

  .login-eyebrow {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 12px;
  }

  .login-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--ink);
    line-height: 1.5;
    margin-bottom: 6px;
  }

  .login-subtitle {
    font-size: 13px;
    color: var(--ink-muted);
    margin-bottom: 40px;
    font-weight: 300;
  }

  .login-label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    color: var(--ink-muted);
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .login-input {
    width: 100%;
    padding: 14px 16px;
    border: 1.5px solid var(--paper-dark);
    border-radius: 2px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    color: var(--ink);
    background: var(--paper);
    margin-bottom: 20px;
    transition: border-color 0.2s;
    outline: none;
    -webkit-appearance: none;
  }

  .login-input:focus {
    border-color: var(--accent);
    background: var(--white);
  }

  .login-btn {
    width: 100%;
    padding: 16px;
    background: var(--ink);
    color: var(--white);
    border: none;
    border-radius: 2px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: background 0.2s;
    margin-top: 4px;
  }

  .login-btn:hover { background: var(--accent); }
  .login-btn:active { opacity: 0.85; }

  .login-error {
    margin-top: 16px;
    padding: 12px 16px;
    background: #fdf0ee;
    border-left: 3px solid #c0392b;
    border-radius: 2px;
    font-size: 13px;
    color: #c0392b;
    display: none;
  }

  /* ── 메인 앱 ── */
  #appScreen { display: none; }

  /* 상단 헤더 */
  .app-header {
    background: var(--ink);
    color: var(--white);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  }

  .header-book {
    font-family: 'Noto Serif KR', serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--gold-light);
    letter-spacing: 0.03em;
  }

  .header-student {
    font-size: 12px;
    color: rgba(255,255,255,0.55);
    font-weight: 300;
  }

  .header-progress {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .progress-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    transition: background 0.3s;
  }

  .progress-dot.done { background: var(--gold); }
  .progress-dot.current { background: var(--accent-light); }

  /* 섹션 네비게이션 */
  .section-nav {
    background: var(--white);
    border-bottom: 1px solid var(--paper-dark);
    padding: 0 24px;
    display: flex;
    gap: 0;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  .section-nav::-webkit-scrollbar { display: none; }

  .section-tab {
    padding: 14px 18px;
    font-size: 12px;
    font-weight: 500;
    color: var(--ink-muted);
    cursor: pointer;
    border-bottom: 2.5px solid transparent;
    white-space: nowrap;
    transition: all 0.2s;
    position: relative;
  }

  .section-tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  .section-tab.done {
    color: var(--section-done);
  }

  .section-tab.done::after {
    content: '✓';
    margin-left: 5px;
    font-size: 10px;
  }

  .section-tab.locked {
    color: var(--paper-dark);
    cursor: not-allowed;
  }

  /* 메인 콘텐츠 */
  .main-content {
    max-width: 900px;
    margin: 0 auto;
    padding: 32px 24px 80px;
  }

  /* 섹션 패널 */
  .section-panel { display: none; }
  .section-panel.active { display: block; }

  /* 섹션 헤더 */
  .section-header {
    margin-bottom: 32px;
  }

  .section-eyebrow {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 10px;
  }

  .section-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.4;
    margin-bottom: 8px;
  }

  .section-desc {
    font-size: 13px;
    color: var(--ink-muted);
    font-weight: 300;
    line-height: 1.7;
  }

  /* 소설 텍스트 뷰어 */
  .text-viewer {
    background: var(--white);
    border-radius: 4px;
    box-shadow: var(--shadow);
    overflow: hidden;
    margin-bottom: 40px;
  }

  .text-viewer-header {
    background: var(--ink);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .text-viewer-label {
    font-size: 11px;
    color: var(--gold-light);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-weight: 500;
  }

  .text-viewer-range {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
  }

  .text-body {
    padding: 40px 48px;
    font-family: 'Noto Serif KR', serif;
    font-size: 16px;
    line-height: 2.1;
    color: var(--ink-soft);
    font-weight: 300;
  }

  .text-body p { margin-bottom: 1.4em; }
  .text-body p:last-child { margin-bottom: 0; }

  /* 하이라이트 문단 */
  .text-highlight-section {
    background: var(--accent-pale);
    border-left: 3px solid var(--accent);
    margin: 0 -48px;
    padding: 24px 48px;
  }

  /* 활동 카드 */
  .activity-section {
    margin-bottom: 32px;
  }

  .activity-divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 28px;
  }

  .activity-divider-line {
    flex: 1;
    height: 1px;
    background: var(--paper-dark);
  }

  .activity-divider-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
  }

  .activity-card {
    background: var(--white);
    border-radius: 4px;
    box-shadow: var(--shadow);
    padding: 32px;
    margin-bottom: 20px;
  }

  .activity-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
  }

  .badge-letter {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--ink);
    color: var(--white);
    font-size: 12px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Noto Serif KR', serif;
  }

  .badge-type {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-muted);
  }

  .activity-question {
    font-family: 'Noto Serif KR', serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--ink);
    line-height: 1.7;
    margin-bottom: 6px;
  }

  .activity-question-sub {
    font-size: 13px;
    color: var(--ink-muted);
    margin-bottom: 18px;
    font-weight: 300;
    line-height: 1.6;
  }

  .activity-textarea {
    width: 100%;
    min-height: 120px;
    padding: 16px;
    border: 1.5px solid var(--paper-dark);
    border-radius: 2px;
    font-family: 'Noto Serif KR', serif;
    font-size: 15px;
    line-height: 1.8;
    color: var(--ink);
    background: var(--paper);
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }

  .activity-textarea:focus {
    border-color: var(--accent);
    background: var(--white);
  }

  .activity-textarea.reason {
    min-height: 90px;
  }

  /* B 질문 카드 (내용 확인) */
  .comprehension-card {
    background: var(--white);
    border-radius: 4px;
    box-shadow: var(--shadow);
    padding: 32px;
    margin-bottom: 20px;
  }

  .q-item {
    margin-bottom: 28px;
    padding-bottom: 28px;
    border-bottom: 1px solid var(--paper-warm);
  }

  .q-item:last-child {
    margin-bottom: 0;
    padding-bottom: 0;
    border-bottom: none;
  }

  .q-number {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.15em;
    color: var(--accent);
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .q-text {
    font-family: 'Noto Serif KR', serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--ink);
    line-height: 1.7;
    margin-bottom: 14px;
  }

  /* 완료 버튼 */
  .submit-area {
    margin-top: 36px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .submit-btn {
    width: 100%;
    max-width: 400px;
    padding: 18px 32px;
    background: var(--ink);
    color: var(--white);
    border: none;
    border-radius: 2px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.2s;
  }

  .submit-btn:hover { background: var(--accent); }
  .submit-btn:disabled {
    background: var(--paper-dark);
    color: var(--ink-muted);
    cursor: not-allowed;
  }

  .submit-hint {
    font-size: 12px;
    color: var(--ink-muted);
    text-align: center;
  }

  /* 완료 상태 */
  .done-banner {
    background: var(--section-done-pale);
    border: 1.5px solid var(--section-done);
    border-radius: 4px;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    margin-top: 32px;
  }

  .done-icon {
    width: 36px; height: 36px;
    background: var(--section-done);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    color: white;
    font-size: 16px;
  }

  .done-text strong {
    display: block;
    font-size: 14px;
    font-weight: 600;
    color: var(--section-done);
    margin-bottom: 2px;
  }

  .done-text span {
    font-size: 12px;
    color: var(--ink-muted);
  }

  /* 잠금 상태 */
  .locked-banner {
    background: var(--paper-warm);
    border-radius: 4px;
    padding: 48px 32px;
    text-align: center;
    margin-top: 24px;
  }

  .locked-icon {
    font-size: 32px;
    margin-bottom: 16px;
  }

  .locked-text {
    font-family: 'Noto Serif KR', serif;
    font-size: 16px;
    color: var(--ink-muted);
    font-weight: 300;
  }

  /* 토스트 */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--ink);
    color: var(--white);
    padding: 14px 24px;
    border-radius: 2px;
    font-size: 13px;
    font-weight: 400;
    box-shadow: var(--shadow-lg);
    transition: transform 0.3s ease;
    z-index: 999;
    white-space: nowrap;
    pointer-events: none;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-left: 3px solid var(--section-done); }
  .toast.error { border-left: 3px solid #c0392b; }

  /* 로딩 */
  .loading-overlay {
    position: fixed;
    inset: 0;
    background: rgba(26,23,20,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 500;
    display: none;
  }

  .loading-spinner {
    width: 40px; height: 40px;
    border: 3px solid rgba(255,255,255,0.2);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* 반응형 */
  @media (max-width: 600px) {
    .login-card { padding: 40px 28px; }
    .text-body { padding: 28px 24px; font-size: 15px; }
    .text-highlight-section { margin: 0 -24px; padding: 20px 24px; }
    .activity-card, .comprehension-card { padding: 24px 20px; }
    .section-title { font-size: 20px; }
    .main-content { padding: 24px 16px 80px; }
  }
</style>
</head>
<body>

<!-- 로그인 화면 -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-eyebrow">고흥대서중학교 · 국어</div>
    <div class="login-title">한 학기 한 권 읽기<br>독서 일지</div>
    <div class="login-subtitle">감정을 할인가에 판매합니다 — 이세형</div>
    <label class="login-label" for="inputId">학번</label>
    <input class="login-input" id="inputId" type="number" placeholder="예) 30101" inputmode="numeric">
    <label class="login-label" for="inputName">이름</label>
    <input class="login-input" id="inputName" type="text" placeholder="이름을 입력하세요">
    <button class="login-btn" onclick="doLogin()">독서 일지 시작하기</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- 메인 앱 -->
<div id="appScreen">
  <header class="app-header">
    <div>
      <div class="header-book">감정을 할인가에 판매합니다</div>
      <div class="header-student" id="headerStudent"></div>
    </div>
    <div class="header-progress" id="headerProgress"></div>
  </header>

  <nav class="section-nav" id="sectionNav"></nav>

  <main class="main-content" id="mainContent"></main>
</div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<!-- 로딩 -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
</div>

// ── 상태 ──
let currentUser = null;
let currentSection = 1;
let progress = {}; // { 1: {done, data}, 2: ... }

// ── 유틸 ──
function showLoading(v) {
  document.getElementById('loadingOverlay').style.display = v ? 'flex' : 'none';
}

function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── 로그인 ──
async function doLogin() {
  const studentId = document.getElementById('inputId').value.trim();
  const name = document.getElementById('inputName').value.trim();
  const errEl = document.getElementById('loginError');
  errEl.style.display = 'none';

  if (!studentId || !name) {
    errEl.textContent = '학번과 이름을 모두 입력해주세요.';
    errEl.style.display = 'block';
    return;
  }

  showLoading(true);
  try {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({ type: 'login', studentId, name }),
      headers: { 'Content-Type': 'text/plain' }
    });
    const data = await res.json();
    if (data.success) {
      currentUser = { studentId, name };
      await loadProgress();
      initApp();
    } else {
      errEl.textContent = data.message || '로그인에 실패했습니다.';
      errEl.style.display = 'block';
    }
  } catch(e) {
    errEl.textContent = '서버 연결에 실패했습니다. 잠시 후 다시 시도해주세요.';
    errEl.style.display = 'block';
  }
  showLoading(false);
}

// ── Firestore 진도 불러오기 ──
async function loadProgress() {
  const docId = `${currentUser.studentId}_${currentUser.name}`;
  try {
    const doc = await db.collection('progress').doc(docId).get();
    if (doc.exists) {
      progress = doc.data().sections || {};
    } else {
      progress = {};
    }
  } catch(e) {
    progress = {};
  }
}

// ── Firestore 진도 저장 ──
async function saveProgress() {
  const docId = `${currentUser.studentId}_${currentUser.name}`;
  try {
    await db.collection('progress').doc(docId).set({
      studentId: currentUser.studentId,
      name: currentUser.name,
      sections: progress,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  } catch(e) {
    console.error('진도 저장 실패', e);
  }
}

// ── Google Sheets 기록 ──
async function recordToSheet(sectionId, sectionData) {
  const answers = sectionData.answers || {};
  try {
    await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({
        type: 'record',
        studentId: currentUser.studentId,
        name: currentUser.name,
        section: `섹션 ${sectionId}`,
        impressiveSentence: answers.sentence || '',
        sentenceReason: answers.reason || '',
        comprehensionAnswer: answers.comprehension || '',
        deepAnswer: answers.deep || ''
      }),
      headers: { 'Content-Type': 'text/plain' }
    });
  } catch(e) {
    console.error('시트 기록 실패', e);
  }
}

// ── 앱 초기화 ──
function initApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'block';
  document.getElementById('headerStudent').textContent = `${currentUser.studentId} · ${currentUser.name}`;

  // 첫 미완료 섹션으로 이동
  let startSection = 1;
  for (let i = 1; i <= 5; i++) {
    if (progress[i] && progress[i].done) startSection = i + 1;
    else break;
  }
  currentSection = Math.min(startSection, 5);

  renderNav();
  renderContent();
}

// ── 네비게이션 렌더 ──
function renderNav() {
  const nav = document.getElementById('sectionNav');
  nav.innerHTML = '';

  // 헤더 진도 점
  const hp = document.getElementById('headerProgress');
  hp.innerHTML = '';

  SECTIONS.forEach(s => {
    const done = progress[s.id] && progress[s.id].done;
    const isCurrent = s.id === currentSection;
    const isUnlocked = s.id === 1 || (progress[s.id - 1] && progress[s.id - 1].done);

    const tab = document.createElement('div');
    tab.className = 'section-tab' + (isCurrent ? ' active' : '') + (done ? ' done' : '') + (!isUnlocked && !isCurrent ? ' locked' : '');
    tab.textContent = `${s.id}부`;
    tab.onclick = () => {
      if (isUnlocked || done) {
        currentSection = s.id;
        renderNav();
        renderContent();
        window.scrollTo(0, 0);
      } else {
        showToast('이전 섹션을 먼저 완료해주세요.', 'error');
      }
    };
    nav.appendChild(tab);

    const dot = document.createElement('div');
    dot.className = 'progress-dot' + (done ? ' done' : '') + (isCurrent && !done ? ' current' : '');
    hp.appendChild(dot);
  });
}

// ── 콘텐츠 렌더 ──
function renderContent() {
  const s = SECTIONS.find(x => x.id === currentSection);
  const isUnlocked = s.id === 1 || (progress[s.id - 1] && progress[s.id - 1].done);
  const isDone = progress[s.id] && progress[s.id].done;
  const saved = progress[s.id] && progress[s.id].answers ? progress[s.id].answers : {};

  let html = '';

  // 섹션 헤더
  html += `
    <div class="section-header">
      <div class="section-eyebrow">섹션 ${s.id} · ${s.range}</div>
      <div class="section-title">${s.title}</div>
      <div class="section-desc">${s.desc}</div>
    </div>
  `;

  if (!isUnlocked) {
    html += `
      <div class="locked-banner">
        <div class="locked-icon">🔒</div>
        <div class="locked-text">이전 섹션을 완료하면 읽을 수 있어요.</div>
      </div>
    `;
    document.getElementById('mainContent').innerHTML = html;
    return;
  }

  // 텍스트 뷰어
  html += `
    <div class="text-viewer">
      <div class="text-viewer-header">
        <div class="text-viewer-label">소설 읽기</div>
        <div class="text-viewer-range">${s.range}</div>
      </div>
      <div class="text-body">
  `;

  s.text.forEach((para, i) => {
    const isHighlight = s.highlight && s.highlight.includes(i);
    if (isHighlight) {
      html += `<p class="text-highlight-section">${para}</p>`;
    } else {
      html += `<p>${para}</p>`;
    }
  });

  html += `</div></div>`;

  // 활동 영역
  html += `
    <div class="activity-divider">
      <div class="activity-divider-line"></div>
      <div class="activity-divider-label">활동하기</div>
      <div class="activity-divider-line"></div>
    </div>
  `;

  // A 활동 — 인상깊은 문장
  html += `
    <div class="activity-card">
      <div class="activity-badge">
        <div class="badge-letter">A</div>
        <div class="badge-type">인상깊은 문장</div>
      </div>
      <div class="activity-question">이 섹션에서 가장 인상깊었던 문장을 직접 옮겨 써보세요.</div>
      <div class="activity-question-sub">소설 본문에서 한 문장 또는 짧은 구절을 선택해주세요.</div>
      <textarea class="activity-textarea" id="sentenceInput" placeholder="인상깊은 문장을 입력하세요..." ${isDone ? 'disabled' : ''}>${saved.sentence || ''}</textarea>
      <div class="activity-question" style="margin-top: 20px;">왜 이 문장이 인상깊었나요?</div>
      <div class="activity-question-sub">자신의 경험이나 생각과 연결해서 2~3문장으로 써보세요.</div>
      <textarea class="activity-textarea reason" id="reasonInput" placeholder="이유를 써보세요..." ${isDone ? 'disabled' : ''}>${saved.reason || ''}</textarea>
    </div>
  `;

  // B 활동 — 내용 확인 (섹션 5 제외)
  if (s.questions.b) {
    html += `
      <div class="comprehension-card">
        <div class="activity-badge">
          <div class="badge-letter">B</div>
          <div class="badge-type">내용 확인</div>
        </div>
    `;
    s.questions.b.forEach((q, i) => {
      const placeholder = `질문 ${i+1}에 대한 답을 써보세요...`;
      const savedVal = saved[`comp${i}`] || '';
      html += `
        <div class="q-item">
          <div class="q-number">질문 ${i + 1}</div>
          <div class="q-text">${q}</div>
          <textarea class="activity-textarea" id="compInput${i}" placeholder="${placeholder}" ${isDone ? 'disabled' : ''}>${savedVal}</textarea>
        </div>
      `;
    });
    html += `</div>`;
  }

  // C 활동 — 심화 질문
  if (s.questions.c) {
    html += `
      <div class="activity-card">
        <div class="activity-badge">
          <div class="badge-letter">C</div>
          <div class="badge-type">심화 질문</div>
        </div>
    `;
    const cArr = Array.isArray(s.questions.c) ? s.questions.c : [s.questions.c];
    cArr.forEach((q, i) => {
      const savedVal = saved[`deep${i}`] || '';
      html += `
        ${i > 0 ? '<div style="border-top: 1px solid var(--paper-warm); margin: 24px 0;"></div>' : ''}
        <div class="q-number">심화 ${cArr.length > 1 ? i+1 : ''}</div>
        <div class="activity-question">${q}</div>
        <div class="activity-question-sub">정답은 없어요. 자신의 생각을 솔직하게 써보세요.</div>
        <textarea class="activity-textarea" id="deepInput${i}" placeholder="생각을 자유롭게 써보세요..." style="min-height: 140px;" ${isDone ? 'disabled' : ''}>${savedVal}</textarea>
      `;
    });
    html += `</div>`;
  }

  // 완료 버튼 or 완료 배너
  if (isDone) {
    const isLast = s.id === 5;
    html += `
      <div class="done-banner">
        <div class="done-icon">✓</div>
        <div class="done-text">
          <strong>섹션 ${s.id} 완료</strong>
          <span>${isLast ? '모든 섹션을 완료했어요. 수고했습니다!' : '다음 섹션을 이어서 읽어보세요.'}</span>
        </div>
      </div>
    `;
    if (!isLast) {
      html += `
        <div class="submit-area">
          <button class="submit-btn" onclick="goNextSection()">섹션 ${s.id + 1}부 읽으러 가기 →</button>
        </div>
      `;
    }
  } else {
    html += `
      <div class="submit-area">
        <button class="submit-btn" id="submitBtn" onclick="submitSection()">활동 완료하고 저장하기</button>
        <div class="submit-hint">모든 칸을 채운 뒤 저장해주세요.</div>
      </div>
    `;
  }

  document.getElementById('mainContent').innerHTML = html;
}

// ── 섹션 제출 ──
async function submitSection() {
  const s = SECTIONS.find(x => x.id === currentSection);
  const sentence = document.getElementById('sentenceInput').value.trim();
  const reason = document.getElementById('reasonInput').value.trim();

  if (!sentence || !reason) {
    showToast('인상깊은 문장과 이유를 모두 입력해주세요.', 'error');
    return;
  }

  let comprehensionParts = [];
  if (s.questions.b) {
    const parts = [];
    for (let i = 0; i < s.questions.b.length; i++) {
      const val = document.getElementById(`compInput${i}`).value.trim();
      if (!val) {
        showToast('내용 확인 질문의 답을 모두 입력해주세요.', 'error');
        return;
      }
      parts.push(`Q${i+1}: ${val}`);
    }
    comprehensionParts = parts;
  }

  const cArr = Array.isArray(s.questions.c) ? s.questions.c : (s.questions.c ? [s.questions.c] : []);
  const deepParts = [];
  for (let i = 0; i < cArr.length; i++) {
    const val = document.getElementById(`deepInput${i}`).value.trim();
    if (!val) {
      showToast('심화 질문의 답을 입력해주세요.', 'error');
      return;
    }
    deepParts.push(`심화${i+1}: ${val}`);
  }

  showLoading(true);
  document.getElementById('submitBtn').disabled = true;

  // 답변 저장 객체
  const answers = { sentence, reason };
  if (s.questions.b) {
    for (let i = 0; i < s.questions.b.length; i++) {
      answers[`comp${i}`] = document.getElementById(`compInput${i}`).value.trim();
    }
  }
  for (let i = 0; i < cArr.length; i++) {
    answers[`deep${i}`] = document.getElementById(`deepInput${i}`).value.trim();
  }

  const sectionData = {
    done: true,
    answers,
    completedAt: new Date().toISOString()
  };

  // Firestore 저장
  progress[currentSection] = sectionData;
  await saveProgress();

  // Google Sheets 기록
  await recordToSheet(currentSection, {
    answers: {
      sentence,
      reason,
      comprehension: comprehensionParts.join('\n'),
      deep: deepParts.join('\n')
    }
  });

  showLoading(false);
  showToast(`섹션 ${currentSection} 완료! 저장되었습니다.`, 'success');
  renderNav();
  renderContent();
}
