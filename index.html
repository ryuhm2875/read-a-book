<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>독서 일지 — 감정을 할인가에 판매합니다</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:#1a1714;--ink-soft:#3d3830;--ink-muted:#7a7268;
    --paper:#f7f4ef;--paper-warm:#efe9e0;--paper-dark:#e4ddd2;
    --accent:#8b4513;--accent-light:#c4763a;--accent-pale:#f0e6d8;
    --gold:#b8965a;--gold-light:#d4b483;--white:#fdfaf6;
    --done:#4a7c59;--done-pale:#e8f2eb;
    --shadow:0 4px 24px rgba(26,23,20,.10);--shadow-lg:0 8px 48px rgba(26,23,20,.15);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}

  /* 로그인 */
  #loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,#1a1714 0%,#2d2620 50%,#3d3020 100%);padding:24px}
  .login-card{background:var(--white);border-radius:4px;padding:56px 48px;width:100%;max-width:420px;box-shadow:var(--shadow-lg);position:relative;overflow:hidden}
  .login-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--accent),var(--gold))}
  .login-eyebrow{font-size:10px;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:12px}
  .login-title{font-family:'Noto Serif KR',serif;font-size:22px;font-weight:600;color:var(--ink);line-height:1.5;margin-bottom:6px}
  .login-subtitle{font-size:13px;color:var(--ink-muted);margin-bottom:40px;font-weight:300}
  .login-label{display:block;font-size:11px;font-weight:500;letter-spacing:.1em;color:var(--ink-muted);margin-bottom:8px;text-transform:uppercase}
  .login-input{width:100%;padding:14px 16px;border:1.5px solid var(--paper-dark);border-radius:2px;font-family:'Noto Sans KR',sans-serif;font-size:15px;color:var(--ink);background:var(--paper);margin-bottom:20px;transition:border-color .2s;outline:none;-webkit-appearance:none}
  .login-input:focus{border-color:var(--accent);background:var(--white)}
  .login-btn{width:100%;padding:16px;background:var(--ink);color:var(--white);border:none;border-radius:2px;font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:500;letter-spacing:.08em;cursor:pointer;transition:background .2s;margin-top:4px}
  .login-btn:hover{background:var(--accent)}
  .login-error{margin-top:16px;padding:12px 16px;background:#fdf0ee;border-left:3px solid #c0392b;border-radius:2px;font-size:13px;color:#c0392b;display:none}

  /* 앱 */
  #appScreen{display:none}
  .app-header{background:var(--ink);color:var(--white);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.3)}
  .header-book{font-family:'Noto Serif KR',serif;font-size:13px;font-weight:600;color:var(--gold-light);letter-spacing:.03em}
  .header-student{font-size:12px;color:rgba(255,255,255,.55);font-weight:300}
  .header-right{display:flex;align-items:center;gap:12px}
  .autosave-badge{font-size:11px;color:rgba(255,255,255,.35);transition:color .3s}
  .autosave-badge.saving{color:var(--gold-light)}
  .autosave-badge.saved{color:#7ec89a}
  .header-progress{display:flex;align-items:center;gap:6px}
  .progress-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.2);transition:background .3s}
  .progress-dot.done{background:var(--gold)}
  .progress-dot.current{background:var(--accent-light)}

  /* 네비 */
  .section-nav{background:var(--white);border-bottom:1px solid var(--paper-dark);padding:0 24px;display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .section-nav::-webkit-scrollbar{display:none}
  .section-tab{padding:14px 18px;font-size:12px;font-weight:500;color:var(--ink-muted);cursor:pointer;border-bottom:2.5px solid transparent;white-space:nowrap;transition:all .2s}
  .section-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
  .section-tab.done{color:var(--done)}
  .section-tab.done::after{content:'✓';margin-left:5px;font-size:10px}
  .section-tab.locked{color:var(--paper-dark);cursor:not-allowed}

  /* 메인 */
  .main-content{max-width:900px;margin:0 auto;padding:32px 24px 80px}
  .section-header{margin-bottom:32px}
  .section-eyebrow{font-size:10px;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
  .section-title{font-family:'Noto Serif KR',serif;font-size:24px;font-weight:700;color:var(--ink);line-height:1.4;margin-bottom:8px}
  .section-desc{font-size:13px;color:var(--ink-muted);font-weight:300;line-height:1.7}

  /* 텍스트 뷰어 */
  .text-viewer{background:var(--white);border-radius:4px;box-shadow:var(--shadow);overflow:hidden;margin-bottom:40px}
  .text-viewer-header{background:var(--ink);padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
  .text-viewer-label{font-size:11px;color:var(--gold-light);letter-spacing:.15em;text-transform:uppercase;font-weight:500}
  .text-viewer-range{font-size:11px;color:rgba(255,255,255,.4)}
  .text-body{padding:40px 48px;font-family:'Noto Serif KR',serif;font-size:16px;line-height:2.2;color:var(--ink-soft);font-weight:300}
  .text-body p{margin-bottom:1.5em;text-indent:1em}
  .text-body p:last-child{margin-bottom:0}
  .text-body .dialogue{text-indent:0}
  .highlight-bar{background:var(--accent-pale);border-left:3px solid var(--accent);margin:0 -48px;padding:24px 48px}

  /* 툴팁 단어 */
  .vocab{border-bottom:1.5px dotted var(--accent);cursor:pointer;position:relative;color:var(--accent);font-weight:400;-webkit-tap-highlight-color:transparent;display:inline}
  .vocab .tooltip{
    visibility:hidden;opacity:0;
    position:absolute;
    bottom:calc(100% + 10px);
    left:50%;transform:translateX(-50%);
    background:var(--ink);color:var(--white);
    font-size:12px;font-family:'Noto Sans KR',sans-serif;font-weight:400;line-height:1.6;
    padding:10px 14px;border-radius:4px;
    width:200px;
    z-index:9999;
    transition:opacity .15s;
    pointer-events:none;
    text-indent:0;
    white-space:normal;
    box-shadow:0 4px 16px rgba(0,0,0,.3);
    word-break:keep-all;
  }
  .vocab .tooltip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:var(--ink)}
  .vocab.active .tooltip{visibility:visible;opacity:1}
  /* 화면 왼쪽 끝 단어 */
  .vocab.tip-left .tooltip{left:0;transform:none}
  .vocab.tip-left .tooltip::after{left:20px;transform:none}
  /* 화면 오른쪽 끝 단어 */
  .vocab.tip-right .tooltip{left:auto;right:0;transform:none}
  .vocab.tip-right .tooltip::after{left:auto;right:20px;transform:none}

  /* 활동 */
  .activity-divider{display:flex;align-items:center;gap:16px;margin-bottom:28px}
  .activity-divider-line{flex:1;height:1px;background:var(--paper-dark)}
  .activity-divider-label{font-size:10px;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:var(--gold)}
  .activity-card{background:var(--white);border-radius:4px;box-shadow:var(--shadow);padding:32px;margin-bottom:20px}
  .activity-badge{display:inline-flex;align-items:center;gap:8px;margin-bottom:14px}
  .badge-letter{width:28px;height:28px;border-radius:50%;background:var(--ink);color:var(--white);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center}
  .badge-type{font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-muted)}
  .activity-question{font-family:'Noto Serif KR',serif;font-size:16px;font-weight:600;color:var(--ink);line-height:1.7;margin-bottom:6px}
  .activity-question-sub{font-size:13px;color:var(--ink-muted);margin-bottom:18px;font-weight:300;line-height:1.6}
  .activity-textarea{width:100%;min-height:120px;padding:16px;border:1.5px solid var(--paper-dark);border-radius:2px;font-family:'Noto Serif KR',serif;font-size:15px;line-height:1.8;color:var(--ink);background:var(--paper);resize:vertical;outline:none;transition:border-color .2s;-webkit-appearance:none}
  .activity-textarea:focus{border-color:var(--accent);background:var(--white)}
  .q-item{margin-bottom:28px;padding-bottom:28px;border-bottom:1px solid var(--paper-warm)}
  .q-item:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none}
  .q-number{font-size:10px;font-weight:500;letter-spacing:.15em;color:var(--accent);margin-bottom:8px;text-transform:uppercase}
  .q-text{font-family:'Noto Serif KR',serif;font-size:15px;font-weight:600;color:var(--ink);line-height:1.7;margin-bottom:14px}

  /* 감상문 */
  .essay-card{background:var(--white);border-radius:4px;box-shadow:var(--shadow);padding:32px;margin-bottom:20px;border-top:3px solid var(--gold)}
  .essay-title{font-family:'Noto Serif KR',serif;font-size:18px;font-weight:700;color:var(--ink);margin-bottom:8px}
  .essay-desc{font-size:13px;color:var(--ink-muted);margin-bottom:24px;line-height:1.7;font-weight:300}
  .essay-prompt{background:var(--paper-warm);border-radius:2px;padding:16px 20px;margin-bottom:20px;font-size:13px;color:var(--ink-soft);line-height:1.8}
  .essay-prompt strong{display:block;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-bottom:6px}

  /* 버튼 */
  .submit-area{margin-top:36px;display:flex;flex-direction:column;align-items:center;gap:12px}
  .submit-btn{width:100%;max-width:400px;padding:18px 32px;background:var(--ink);color:var(--white);border:none;border-radius:2px;font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:500;letter-spacing:.1em;cursor:pointer;transition:all .2s}
  .submit-btn:hover{background:var(--accent)}
  .submit-btn:disabled{background:var(--paper-dark);color:var(--ink-muted);cursor:not-allowed}
  .submit-hint{font-size:12px;color:var(--ink-muted);text-align:center}
  .done-banner{background:var(--done-pale);border:1.5px solid var(--done);border-radius:4px;padding:20px 24px;display:flex;align-items:center;gap:14px;margin-top:32px}
  .done-icon{width:36px;height:36px;background:var(--done);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:white;font-size:16px}
  .done-text strong{display:block;font-size:14px;font-weight:600;color:var(--done);margin-bottom:2px}
  .done-text span{font-size:12px;color:var(--ink-muted)}
  .locked-banner{background:var(--paper-warm);border-radius:4px;padding:48px 32px;text-align:center;margin-top:24px}
  .locked-icon{font-size:32px;margin-bottom:16px}
  .locked-text{font-family:'Noto Serif KR',serif;font-size:16px;color:var(--ink-muted);font-weight:300}
  .finish-banner{background:linear-gradient(135deg,var(--ink) 0%,#2d2620 100%);border-radius:4px;padding:40px 32px;text-align:center;margin-top:32px;color:var(--white)}
  .finish-icon{font-size:40px;margin-bottom:16px}
  .finish-title{font-family:'Noto Serif KR',serif;font-size:22px;font-weight:700;color:var(--gold-light);margin-bottom:10px}
  .finish-desc{font-size:14px;color:rgba(255,255,255,.6);line-height:1.7;font-weight:300}

  /* 토스트 */
  .toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:var(--white);padding:14px 24px;border-radius:2px;font-size:13px;box-shadow:var(--shadow-lg);transition:transform .3s ease;z-index:999;white-space:nowrap;pointer-events:none}
  .toast.show{transform:translateX(-50%) translateY(0)}
  .toast.success{border-left:3px solid var(--done)}
  .toast.error{border-left:3px solid #c0392b}

  /* 로딩 */
  .loading-overlay{position:fixed;inset:0;background:rgba(26,23,20,.6);display:none;align-items:center;justify-content:center;z-index:500}
  .loading-spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  @media(max-width:600px){
    .login-card{padding:40px 28px}
    .text-body{padding:28px 24px;font-size:15px}
    .highlight-bar{margin:0 -24px;padding:20px 24px}
    .activity-card,.essay-card{padding:24px 20px}
    .section-title{font-size:20px}
    .main-content{padding:24px 16px 80px}
  }
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-card">
    <div class="login-eyebrow">고흥대서중학교 · 국어</div>
    <div class="login-title">한 학기 한 권 읽기<br>독서 일지</div>
    <div class="login-subtitle">감정을 할인가에 판매합니다 — 이세형</div>
    <label class="login-label" for="inputId">학번</label>
    <input class="login-input" id="inputId" type="number" placeholder="예) 30101" inputmode="numeric">
    <label class="login-label" for="inputName">이름</label>
    <input class="login-input" id="inputName" type="text" placeholder="이름을 입력하세요">

</div>

<div id="appScreen">
  <header class="app-header">
    <div>
      <div class="header-book">감정을 할인가에 판매합니다</div>
      <div class="header-student" id="headerStudent"></div>
    </div>

      <div class="header-progress" id="headerProgress"></div>
    </div>
  </header>
  <nav class="section-nav" id="sectionNav"></nav>
  <main class="main-content" id="mainContent"></main>
</div>

<div class="toast" id="toast"></div>
<div class="loading-overlay" id="loadingOverlay" style="display:none">
  <div class="loading-spinner"></div>
</div>

const GAS_URL="https://script.google.com/macros/s/AKfycbzv7deEbs_PjsmOQhuTJDwjv3m95wDOBKJfgDSahjBQ6mKFxMJ_gqfBvorisSW4OQ81/exec";

// ── 질문 텍스트 ──
const QUESTIONS={
  1:{
    b1:"여자는 친한 지인의 결혼식엔 가지 않으면서, 전혀 모르는 사람의 결혼식엔 돈을 받고 하객으로 나갑니다. 얼핏 이상해 보이는 이 선택이 여자에게는 왜 자연스러운 일이었을까요? 본문에서 단서를 찾아 써보세요.",
    b2:"카페에서 여자와 남자는 서로를 의뢰인의 연인으로 착각하고 진지하게 연기했습니다. 두 사람이 착각하게 된 이유를 본문에서 찾고, 이 장면이 웃기면서도 씁쓸하게 느껴지는 이유가 무엇인지 써보세요.",
    c1:"여자는 무릎 꿇고 욕을 먹는 일도 '시나리오 소재가 될 것'이라며 버텨냅니다. 하고 싶은 일을 위해 하기 싫은 일을 견디는 것, 여러분에게도 그런 경험이 있나요? 여자의 상황과 비교하며 자신의 생각을 자유롭게 써보세요."
  },
  2:{
    b1:"사장은 현대인이 사람보다 반려동물을 더 편하게 대하는 이유를 설명합니다. 사장의 설명을 본문에서 찾아 정리하고, 그 설명이 맞다고 생각하는지 자신의 생각도 함께 써보세요.",
    b2:"사장이 여자와 남자에게 요청한 일은 세 가지입니다. 본문에서 찾아 쓰고, 왜 하필 이 두 사람이어야 했는지 사장의 논리를 정리해보세요.",
    c1:"사장은 여자와 남자를 '감정 대리업 종사자'라고 표현했습니다. 지금 우리 주변에서도 감정을 대신 처리해주는 것들이 있지 않을까요? 구체적인 사례를 들고, 그것이 편리함을 주는 동시에 무언가를 잃게 하는 건 아닌지 생각해보세요."

  3:{

    c1:"두 사람은 진심으로 사랑했지만 사랑이 '낙엽처럼 메말라 굳어갔다'고 소설은 말합니다. 진심이 있었는데도 왜 이렇게 됐을까요? AI 때문일까요, 아니면 다른 이유가 있을까요? 자신의 생각을 근거와 함께 써보세요."
  },
  4:{
    b1:"남자는 이혼 후 과거를 하나씩 떠올리다 갑자기 색소폰을 꺼냅니다. 어떤 기억이 남자를 움직이게 했을까요? 본문에서 단서를 찾되, 왜 그 기억이었는지는 자신의 생각으로 써보세요.",
    b2:"남자는 연인 곁에서, 임종 환자 앞에서, 아이들 앞에서, 노숙자 앞에서 각각 돈을 주고 연주했습니다. 각 상황에서 남자가 얻은 것이 무엇인지 본문에서 찾고, 이것들의 공통점이 무엇인지 정리해보세요.",

// ── 단어에 툴팁 적용하는 함수 ──
function applyVocab(text){
  let result=text;
  // 긴 단어부터 처리 (중첩 치환 방지)
  const sorted=Object.keys(VOCAB).sort((a,b)=>b.length-a.length);
  sorted.forEach(word=>{
    const escaped=word.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    // 앞이 한글이면 매칭 안 함 (단어 중간 방지)
    // 문장부호(—„"' 등) 뒤에 오는 단어도 매칭되도록 앞 조건만 한글 체크
    // 이미 치환된 span 안의 단어는 재치환 방지 (vocab 클래스 확인)
    const re=new RegExp(`(?<![가-힣])(${escaped})(?!([^<]*>))`, 'g');
    result=result.replace(re,(match,p1,p2,offset,str)=>{
      // 이미 span.vocab 안에 있으면 치환 안 함
      const before=str.substring(0,offset);
      const openSpans=(before.match(/<span[^>]*class="[^"]*vocab[^"]*"/g)||[]).length;
      const closeSpans=(before.match(/<\/span>/g)||[]).length;
      if(openSpans>closeSpans) return match;
      return `<span class="vocab" tabindex="0">${word}<span class="tooltip">${VOCAB[word]}</span></span>`;
    });
  });
  return result;
}

    {t:"사람들이 의뢰하는 황당한 일들을 대신하면서, 여자는 돈 때문에 이렇게까지 해야 하나 싶었지만 이 황당한 일들과 황당한 사람들을 소재로 삼아 새로운 시나리오를 쓸 수 있을 거라는 희망을 가졌다."},
    {t:"그러던 어느 날, 여자는 새로 들어온 일감 때문에 깊이 고민했다. 의뢰인은 내연남과 밀회를 나누던 유부녀로, 자기를 대신해 내연남에게 이별을 통보해달라고 했다."},
    {t:"직접 만나서 말할 자신은 없고, 그렇다고 통화나 문자메시지로 처리하기에는 너무 큰 문제라, 자신의 친척이나 직장 후배 정도로 신분을 속여서 일을 처리해달라는 요청이었다. 그러면서 의뢰인은 너무 냉정하게 전달하면 악감정을 품고 엉뚱한 일을 벌일까 우려되니 사랑하는 마음은 여전히 남아 있으며 단지 어쩔 수 없는 선택일 뿐이라고 진정성이 느껴지게끔 잘 좀 신경 써달라 거듭 강조했다."},
    {t:"여자는 일을 수락했다. 이런 경험은 인생에서 흔히 겪을 수 없는 일이었다. 막장 드라마 냄새가 풀풀 나는데 그중에서도 하이라이트나 마찬가지인 이별을 고하는 순간이라니. 어차피 의뢰인의 일을 대리하는 역할일 뿐이니 잘잘못은 의뢰인에게 있는 거라고, 그러니 너무 심각하게 고민하지 말자고 여자는 스스로에게 되뇌었다. 게다가 결정적으로 보상 금액이 매우 두둑했다."},
    {t:"대낮의 한적한 카페에서 여자는 약속된 시간에 맞춰 의뢰인의 내연남이 오기를 기다렸다. 막상 남자를 기다리고 있자니 여자는 저도 모르게 점점 초조해졌다."},
    {t:"검은색 벨벳 재질의 롱코트를 입은 젊은 남자가 카페에 들어서며 고개를 두리번거리다가 여자와 눈이 마주쳤을 때, 여자는 직감적으로 저 남자가 오늘 만나기로 예정된 사람임을 알아차렸다."},
    {t:"훤칠한 키, 넓은 어깨, 그림을 그린 듯 선이 곱고 부드러운 이목구비. 여자의 심장이 빠르게 뛰었다. 여자는 자신이 긴장했음을 느꼈다. 그게 비밀스러운 만남이라는 이 상황 탓인지 남자의 외모가 풍기는 첫인상 때문인지 알 수 없었다. 무슨 말부터 해야 할지 머릿속이 하얘지고 있었다."},
    {t:"그사이 남자는 여자가 있는 테이블 쪽으로 다가와 의자를 살짝 당긴 다음 천천히 앉았다. 간단하고 사소하지만 어쩐지 무게감 있는 동작. 아주 잠깐, 여자는 자신이 의뢰를 받고 나온 게 아니라 진짜로 이 남자와 내연의 관계였다면, 하고 상상했다. 자기도 모르게 든 생각에 속으로 적잖이 놀라면서, 겉으로는 아무 일 없는 척 여자는 애써 무표정한 얼굴로 남자를 바라보았다."},
    {t:"남자가 먼저 말했다.",d:true},
    {t:"\"이미 짐작하셨을 것으로 압니다. 미안하게 됐지만 어쩔 수 없습니다.\"",d:true},
    {t:"마치 잔잔한 물결처럼 남자의 목소리가 여자에게 부드럽게 닿았다. 그림처럼 선이 고운 얼굴의 남자가 호수처럼 깊고 중후한 울림의 목소리로 말하는데, 그 간극이 의외로 조화롭게 느껴졌다."},
    {t:"\"두 분의 감정이 보통은 아니라는 거 잘 압니다. 하지만 더 이상은 서로에게 위험합니다.\"",d:true},
    {t:"'위험'이라는 말에 여자의 귀가 솔깃했다."},
    {t:"\"이제 저희 형님을 놓아주셨으면 합니다. 본인이 나오지 못한 점, 대신 사과드립니다. 저희 형, 그쪽을 사랑하는 마음은 진심입니다. 형님이 마음만 간직하게 도와주십시오.\"",d:true},
    {t:"뭔가 낌새가 이상했다. 잠시 여자는 이게 무슨 상황인가 싶어 고개를 갸웃했다. 남자는 물끄러미 여자를 바라보며 대답을 기다렸다."},
    {t:"\"그건 제가 하려던 말인데요……?\"",d:true},
    {t:"여자가 말끝을 흐리며 답했다. 얼어붙은 강물 위로 발을 내딛듯 조심스러운 말투였다."},
    {t:"남자의 눈썹 끝이 슬며시 올라가는 것으로 '그게 무슨?'이라는 말을 대신했다."},
    {t:"\"혹시…….\"",d:true},
    {t:"두 사람이 동시에 말했다.",d:true},
    {t:"\"대리로 나오신 거……?\"",d:true},
    {t:"\"대리 알바하는 분이세요?\"",d:true,hi:true},
    {t:"내연 관계인 당사자들이 서로 상대에게 이별을 통보하고자 가짜로 가족 행세할 대리 알바를 구했으니, 그게 바로 카페에 마주 앉은 여자와 남자였다. 두 사람은 서로를 의뢰인의 정부라고 지레짐작해서는 심각한 척 무게 잡으며 연기한 것이다. 그 사실에 민망한 듯 허탈한 듯 딱 꼬집어 말하기 힘든 헛웃음을 터뜨리며 둘은 시선을 이리저리 굴렸다. 그러다가 둘의 시선이 서로에게 고정되었다. 남자는 웃고 있었다.",hi:true},
    {t:"\"저 같은 사람을 만날 줄은 몰랐네요.\"",d:true,hi:true},
    {t:"감미로운 목소리였다. 여자가 미소를 지었다.",hi:true},
    {t:"두 사람은 연기를 집어치우고 진짜 자신에 대해 이야기했다. 여자가 자신을 시나리오 작가 지망생이라 밝히자 남자는 자신이 색소폰 연주가라고 하였다. 음악 학원을 전전하며 레슨비 조금 받는 게 수입의 거의 전부이고, 이따금 버스킹인지 구걸인지 모를 것도 하며, 유튜브에 색소폰 연주 영상도 간간이 올리지만 조회수는 거의 없다고 하였다. 그러다가 이런 유의 인력 구인 앱을 알고는 새로운 경험이 자신의 음악 세계에 새로운 영감 같은 걸 주지 않을까 막연히 기대하며 (그리고 일하고 받을 돈도 기대하며) 이 일을 시작했다고 말했다. 여자는 자기도 시나리오 쓰는 일에 이런저런 경험이 도움을 줄까 싶어 시작했다며 맞장구쳤다."},
    {t:"\"일하면서 별일을 다 겪지 않아요?\"",d:true},
    {t:"\"그러게 말예요.\"",d:true},
    {t:"\"저는 예전에 어떤 일도 있었느냐 하면…….\"",d:true},
    {t:"남자가 말하길, 한번은 교사를 폭행한 학생의 삼촌 행세를 한 적도 있더란다. 피해 교사 앞에 무릎 꿇고 합의해주십사 애걸해달라는 게 가해자 학생의 부모가 의뢰한 일이었다. 제발 용서해주십사 무릎을 꿇고 머리를 바닥에 조아리느라 이마가 닳을 지경이었다고 남자가 허탈하게 웃으며 말했다. 여자는 자신도 비슷한 일이 있었다며 일전에 무면허 운전으로 사고를 낸 고등학생 녀석의 친척 행세를 하느라 영혼이 탈탈 털리도록 욕받이가 되었던 일화를 늘어놓았다."},
    {t:"두 사람은 자리를 옮겨 함께 저녁을 먹었다. 값비싼 레스토랑이었으나 두 사람의 의뢰인이 계좌로 이체해준 돈 덕분에 이 정도의 사치 한 번쯤은 누릴 수 있었다. 식사 중 가볍게 와인 한 잔씩 곁들였고 헤어지면서 전화번호를 교환했다."}
  ],
  questions:{b:['b1','b2'],c:['c1']}
},
{
  id:2,title:"감정을 파는 시대의 탄생",desc:"토탈 이모션과 AI 감정 서비스의 등장",range:"\"연락과 만남이 이어졌으며\" ~ \"야근은 없습니다!\"",
  paragraphs:[
    {t:"연락과 만남이 이어졌으며 사귀고 동거하기까지 그리 오래 걸리지 않았다. 어느 날, 여자와 남자 모두 같은 곳에서 의뢰를 받았다. '토탈 이모션'이라는 스타트업이었는데, 의뢰 내용은 밝히지 않은 채 자기네 사무실로 찾아와달라는 게 요구의 전부였다. 자세한 사항은 만나서 직접 이야기하자고 했다. 여자가 이런 의뢰가 들어왔다고 말하자 남자는 자기도 같은 의뢰를 받았다며 신기해했다. 두 사람은 이번 의뢰가 이전 일들과 사뭇 다르다는 인상만 받았을 뿐 무슨 내용의 의뢰일지 이렇다 할 짐작은 떠오르지 않았다."},
    {t:"'토탈 이모션' 사무실은 도심 건물 한 곳에 세를 얻은 작은 사무실이었다. 작은 규모의 사무실에 대여섯의 직원이 키보드를 두드리거나 통화하면서 문서를 뒤적이고 있었다. 직원 한 명이 두 사람을 사무실 구석에 놓인 사장실로 안내했다. 조립식 가벽으로 사무실 공간을 나누어 마련한 곳이었다. 사장실에 들어가니 탈모 기미가 엿보이는 건장한 남자가 책상 앞에 앉아 있었다. 그는 어서 오시라 환영하며 자리에서 일어났다. 두꺼운 손으로 힘 있게 악수한 다음, 종이컵 두 잔에 믹스커피를 타서 여자와 남자에게 주었다."},
    {t:"사장은 모 유명 기업 IT 부서에 근무하다가 얼마 전 독립하여 이 회사를 차렸다고 자신을 소개했다."},
    {t:"\"'토탈 이모션'은 현대인의 미래를 책임지는 게 목표입니다.\"",d:true},
    {t:"사장이 대뜸 그렇게 말했다. 말이야 거창했지만 무슨 뜻인지 구체적인 설명이 없어 여자도 남자도 서로 눈치를 살피며 어떻게 반응할지 머뭇거렸다."},
    {t:"사장은 애초에 그들의 반응을 염두에도 두지 않았는지 계속해서 말을 이었다. 현대인의 노동은 점점 정신노동으로 이행되고 있다고, 육체노동의 상당수는 기계에게 내어준 지 오래라고, 그 결과 현대인에게 중요하게 떠오른 화두가 '정신질환'이라고 사장은 진지하게 말했다."},
    {t:"\"육체노동이 중심이던 시절에는 육체적인 질환이 중요했던 것과 같습니다. 정신노동의 비중이 커진 거죠.\"",d:true},
    {t:"사장이 내린 결론인즉 사회는 점점 정신노동으로 개인의 기력을 극도로 소모시키고 있으며 따라서 '심정적 차원의 건강을 관리'하는 게 중요해진다는 것이다."},
    {t:"\"사람들이 갈수록 사람을 불신하고 기피하는 이유가 뭘까요? 택배만 해도 그냥 두고 가라고 하는 경우가 얼마나 많아졌느냔 말이죠. 그런데 자기가 키우는 반려동물한테는 애정을 쏟아요. 어디 그뿐인가요? 사람들이 길고양이를 지금처럼 예뻐한 적이 있었던가 싶을 정도입니다. 그런데 정작 사람 대하는 건 꺼린단 말이죠. 이유가 뭘까요?\"",d:true},
    {t:"\"사람을 상대하는 거 자체가 스트레스라서, 아닐까요.\"",d:true},
    {t:"여자의 대답에 사장은 그게 바로 자신이 원하던 정답이라는 듯 손가락을 튕겼다."},
    {t:"\"정신노동은 대체로 인간관계에 따른 스트레스를 수반합니다. 감정적 에너지가 거의 고갈되는 거죠. 그래서 피하는 거예요. 감정을 소모해야 할 상황 자체를 차단해버리는 식으로 말이죠. 예를 들면 돈을 주고 여러분 같은 대리인에게 상황을 넘긴다든가 라는 식으로요. 그런 점에서 여러분은 '감정 대리업'에 종사하는 자영업자라고 할 수 있겠죠.\"",d:true,hi:true},
    {t:"그러더니 사장은 그림과 글이 적힌 종이 한 장을 두 사람에게 내밀었다."},
    {t:"\"우선 이것 좀 보시죠.\"",d:true},
    {t:"그림은 박물관에 있을 법한 르네상스 시대 유럽 회화 느낌이 다분했고, 글은 미사여구로 점철된 한 편의 시 같았다."},
    {t:"여자와 남자가 그림과 글을 살피는 사이 사장은 어디선가 작은 리모컨을 꺼냈다. 리모컨 버튼을 몇 번 누르자 어디선가 음악이 흘러나왔다."},
    {t:"\"전부 AI가 만든 겁니다. 그 그림도, 글도, 지금 들리는 음악도요.\"",d:true,hi:true},
    {t:"사장이 글과 그림이 담긴 종이를 몇 장 더 내밀었다."},
    {t:"\"어느 게 사람 거고 어느 게 AI 건지 구분되십니까? 이제 AI가 인간의 감수성까지 다뤄주는 시대가 올 겁니다. 지금 두 분께선 그 시대를 미리 맛보기로 체험하시는 거고요.\"",d:true},
    {t:"여자가 말했다.",d:true},
    {t:"\"저기 죄송한데, 그래서 저희를 부르신 이유가 뭔지 잘 모르겠는데요.\"",d:true},
    {t:"뒤이어 남자가 말했다.",d:true},
    {t:"\"사람이 만든 거랑 AI가 만든 거랑 구분되느냐고 그거 하나 알아보려고 부르신 건 아니겠죠?\"",d:true},
    {t:"\"물론 아니죠. 결론은 나 있습니다. 업계에선 누가 AI 예술 시장을 선점할지 시간 싸움이라는 게 중론이에요. '토탈 이모션'은 AI를 통한 '감정 서비스'를 제공하는 기업입니다. 최고의 감정 서비스를 위해, 저희 기업은 '감정 대리업'에 종사하는 분들의 도움이 필요해 여러분을 부른 것입니다.\"",d:true},
    {t:"사장은 우선 문자메시지 자동생성 AI부터 서비스할 계획이라고 했다. 사람을 만나는 건 물론 전화도 싫다면 문자메시지밖에 방법이 없다. 그런데 문자메시지로 성심성의껏 진지한 이야기를, 그것도 호소력 있게 쓰기란 어려운 일이다. '토탈 이모션'이 개발 중인 문자메시지 AI 앱 '토탈 텍스트'는 발신자가 메시지 내용을 입력하지 않더라도 앱에 탑재된 AI가 유심카드의 정보, 온라인 접속 기록, 핸드폰을 터치할 때 확인된 체온과 심박수 등을 분석하여 상황, 목적, 취지, 전달받을 상대의 입장, 전해져야 할 감정과 분위기 등을 파악하고 마치 사람이 쓴 것처럼 호소력 있는 텍스트를 생성, 발송하는 앱이었다."},
    {t:"AI의 완성도를 높이기 위해서는 더 많은 데이터가 필요하며, 그러므로 최대한 많은 데이터를 확보해야 한다고 사장은 강조했다."},
    {t:"\"여러분이 데이터 그 자체입니다. 두 분은 다양한 상황에서 다양한 역할을 한 경험이 있을 겁니다. 그래서 부른 겁니다. 그 경험을 '토탈 텍스트'에 입력하는 겁니다. 우리 회사의 기술팀이 여러분의 노하우를 알고리즘화할 겁니다. 여러분은 AI가 내놓은 아웃풋을 확인하고 피드백 해주시면 됩니다. 데이터베이스 제공, 아웃풋 확인 그리고 피드백. 이렇게 세 가지만 하시면 됩니다. 저는 지금 두 분께 우리 회사의 직원이 되어달라고 말하는 겁니다.\"",d:true},
    {t:"그리고 사장은 입가를 올리며 이렇게 덧붙였다."},
    {t:"\"정규직입니다. 야근은 없습니다! 뭐, 기술팀은 종종 있지만요.\"",d:true}
  ],
  questions:{b:['b1','b2'],c:['c1']}
},
{
  id:3,title:"풍요 속의 공허",desc:"AI에 잠식된 삶과 균열하는 사랑",range:"\"토탈 텍스트는 성공했다\" ~ 이혼 서류 서명",
  paragraphs:[
    {t:"'토탈 텍스트'는 성공했다. 올해의 베스트 애플리케이션으로 선정된 게 당연할 정도였다. 여자와 남자 그리고 추가로 채용된 '데이터 인력'들이 사람을 상대해온 경험을 데이터베이스로 구축한 결과였다. 사장은 여자와 남자를 포함한 '데이터 인력'을 아예 DB 전담팀으로 편성했다. 그리고 두 번째 작품으로 '토탈 ARS'를 내놓았다. '토탈 텍스트'가 개인을 대상으로 한 서비스라면, '토탈 ARS'는 기업을 타깃으로 했다."},
    {t:"비록 ARS의 상당 부분이 자동화되어 있었지만 아직도 많은 고객이 상담원과 직접 통화하길 원했다. '토탈 ARS'는 이 점을 공략했다. 기업이 '토탈 ARS'를 구매하고 설치하면, 고객의 불만에도 스트레스받지 않는 AI가 시종일관 침착하고 공손한 태도로 고객을 응대했다. 사람보다 정교했고 사람보다 친절했으며 사람과 달리 싸우지 않았다. 1년 만에 각종 기업과 관공서의 ARS를 '토탈 ARS'가 대체했다."},
    {t:"두 번의 연이은 성공에 힘입어 '토탈 이모션'은 각종 상품을 출시했다. 실행과 동시에 사용자의 취향을 분석해 이야기를 생성하는 소설 앱 '토탈 픽션', 가장 좋아할 수밖에 없는 소리를 팝, 힙합, 로큰롤, 클래식, R&B, 재즈 등 다양한 장르로 생성함은 물론 ASMR 기능까지 겸비한 '토탈 사운드', 진짜 같은 가짜 사진과 고전적인 서양화 및 동양화부터 포스트 모던 추상화까지 그려내는 '토탈 드로잉' 등이 그 뒤를 이었다."},
    {t:"그러다가 역대급 작품 '토탈 프렌드'가 나타났다. 언제 어디서든 곁에 있어줄 아바타가 자동으로 생성되는 앱이었다. 가령 혼자 밥 먹으며 드라마를 보다가 '토탈 프렌드'를 실행하면, 핸드폰 카메라를 통해 AI가 외부를 파악한 후 함께 드라마를 보며 식사 중인 인간의 모습을 화면상으로 생성해냈다."},
    {t:"자동으로 생성된 AI 아바타는 화면 속에서 밥을 먹으며 화면 밖의 인간과 드라마를 감상한 다음 이런저런 이야기를 나눴다. 마치 진짜 친구처럼, 직장인들은 출퇴근길에 이어폰을 꽂고 아바타와 대화하며 시간을 죽였고, 학생들은 '토탈 프렌드'를 실행해 함께 공부하는 식으로 집중력을 높였다. 엔터테인먼트 회사들과 '토탈 이모션'이 제휴를 맺은 뒤로는 아이돌 스타들의 아바타가 '토탈 프렌드'에 등장했다."},
    {t:"회사의 주가가 폭발적으로 오른 것은 놀랍지도 않았으며, 순식간에 '토탈 이모션'은 대기업으로 거듭났다. 회사의 창업 멤버였던 여자와 남자는 높은 수준의 안정된 급여로 풍족한 삶을 누렸다. 그리고 마침내 둘은 결혼하기에 이르렀다."},
    {t:"스크린 너머로 주인공 배우가 열연을 펼치고 있었다. 선택의 기로에서 갈등한 끝에 비장한 각오를 결심하는 대목이었다. 대사를 읊는 배우의 목소리가 미세하게 떨렸다. 긴장감을 자아내기에 충분한 떨림이었다. 배우는 영리하게도 대사를 읊는 중간중간 호흡 소리를 섞는다든가 일부러 잠시 입을 다물고 뜸을 들이는 식으로 분위기를 조절했다. 배역과 완전히 하나 된 듯 눈동자에 빛이 어려 있었다."},
    {t:"영화가 끝나고 하나둘 관객들이 객석을 빠져나갔다. 극장을 나서는 관객 무리 중에는 여자와 남자도 있었다. 부부가 된 두 사람은 어느새 함께 나이를 먹어가는 처지였다."},
    {t:"\"주인공이 연기를 잘하네.\"",d:true},
    {t:"남자가 여자에게 말했다.",d:true},
    {t:"\"응, 그러게.\"",d:true},
    {t:"여자가 텅 빈 목소리로 말했다."},
    {t:"남자는 여자가 불편해하고 있다는 걸 알아차렸다. 함께 살아온 시간이 그 정도쯤은 쉽게 알아차리게끔 만들어주었다. 남자가 걱정하는 눈길로 여자를 바라보았다."},
    {t:"\"무슨 생각 해?\"",d:true},
    {t:"남자가 조심스럽게 물었다. 여자는 조용히 시선을 내린 채 잠시 생각을 고르다가, 솔직하게 밝혔다."},
    {t:"\"이젠 연기하는 것까지 AI가 사람보다 더 잘하는구나, 싶더라고. 그냥 그런 생각이 들었어.\"",d:true,hi:true},
    {t:"방금 두 사람이 보고 온 영화의 주연은 인간이 아니었다. AI 홀로그램이었다. 영화에 출연한 모든 배우가 AI 홀로그램이었다. 각본과 연출도 AI가 맡은, 하나부터 열까지 AI가 만든 영화였다.",hi:true},
    {t:"AI 업계와 회사의 성장 덕에 여자와 남자가 안락한 결혼 생활을 누리는 동안, 예술가들은 서서히 몰락했다. '토탈 이모션'을 필두로 AI가 예술을 통한 감정 체험의 영역까지 침범해 온 탓이었다. 한때 예술가들은 AI가 예술을 하는 건 불가능하다고 믿었다. AI는 알고리즘이고, 알고리즘은 창의성을 가질 수 없으며, 따라서 창의성이 요구되는 예술 분야는 넘볼 수 없으리라 생각했다. 그러나 그것은 착각이었다. 사람들은 점점 AI가 내놓은 작품에 반응하기 시작했다."},
    {t:"창의성이 없는 작품이어도 사람들에게 정서적인 만족감을 선사하는 건 얼마든지 가능한 일이었다. 예술성을 외치는 인간 예술가의 작품과 감상하는 사람들을 만족시키는 게 목표인 AI의 콘텐츠 중 대중이 어느 쪽을 더 선호할지는 자명한 일이었다. 음악, 미술, 문학 등 분야를 막론하고 예술가들은 AI에게 자리를 내어주며 자연스레 소멸했다."},
    {t:"\"영화가 별로였구나.\"",d:true},
    {t:"\"아니야, 괜찮았어. 오히려 좋았어. 영화 자체는 잘 만든 영화야. 연출도 세련됐고.\"",d:true},
    {t:"\"그렇지? 마지막 장면을 롱테이크로 잡은 게 영화 결말이랑 잘 어울리는 느낌이었어.\"",d:true},
    {t:"그게 AI가 아니라 인간이 했다면 다른 느낌이었을까, 하는 생각이 여자의 머릿속에 스치듯 떠올랐다. 만약 인간이 그 장면에 손을 댔다면 AI보다 못했을까, 아니면 전혀 다른 신선한 기법이 가능했을까, 같은 물음이 꼬리를 물고 이어졌다."},
    {t:"감상을 늘어놓던 남자는 문득 자기 혼자 너무 길게 떠들고 있다는 생각에 잠시 멈칫했다. 그러자 여자가 남자를 바라보며 안심하라는 듯 웃는 표정을 지어 보였다. 남자가 다시 편안하게 하던 말을 이었다. 웃고 있는 여자의 얼굴에 메마른 기색이 올라와 있음을 미처 알아보지 못한 채로."},
    {t:"이제 모든 예술 분야를 AI가 장악한 시대였고, 그래서 인간 예술가가 벌던 돈을 AI 회사가 벌어들이는 시대였다. 여자와 남자가 한때 예술가를 꿈꾸었다는 게 아이러니할 따름이었다. 두 사람이야말로 AI 예술 시대의 문을 연 선구자였다. 그리고 그 덕분에 여유로운 삶을 누리고 있었다. 꽃이 지지 않는 영원한 봄처럼 안락한 나날이 이어져왔다."},
    {t:"하지만 이 순간, 여자의 마음 한 곳에서 그 봄이 균열을 일으키고 있었다."},
    {t:"\"시나리오를 쓰고 싶어.\"",d:true},
    {t:"여자가 저녁을 먹다 말고 수저를 내려놓으며 말했다. 그리고 한쪽 입꼬리만 올리며 옅은 냉소를 지었다."},
    {t:"\"써봤자 누가 받아주지도 않겠지. 어느 회사가 사람이 쓴 원고를 받아주겠어. AI가 항상 돈 되는 이야기를 만들어주니 말이야. 걸작은 아니어도 사람들이 항상 좋아할 수밖에 없는 이야기가 자동으로 나오는 세상에.\"",d:true},
    {t:"\"……그래도 시도는 할 수 있잖아.\"",d:true},
    {t:"남자는 자기가 답하고도 궁색한 느낌이 들었는지 눈동자를 좌우로 굴리고는 얼른 다음 말을 덧붙였다."},
    {t:"\"뭐, 꼭 남들이 알아줄 필요가 있겠어? 취미로 계속하는 것도 좋은 방법일 테고.\"",d:true},
    {t:"그래도 미덥지 않았는지 쥐어짜듯 이런 말을 하였다."},
    {t:"\"혹시 모르지. 계속 쓰다 보면 계약 제안 들어올, 훌륭한 작품이 될지도……\"",d:true},
    {t:"여자는 남자를 힐끔 한번 쳐다볼 뿐 대답은 않았다. 더 이상 남자의 목소리가 호수처럼 깊지도 부드럽지도 않았다. 세월에 녹슨 남자의 성대에 쇳소리가 섞여 나왔다. 한 폭의 그림 같던 이목구비도 시간이 새긴 자잘한 주름에 서서히 흐려지고 있었다."},
    {t:"\"자기는 음악하고 싶은 마음 없어?\"",d:true},
    {t:"남자는 선뜻 입을 열지 못했다. 마지막으로 색소폰을 분 게 언제였는지 기억나지 않았다. 두 사람이 궁핍하던 시절, 비록 열악하지만 함께 살고 있다는 사실만으로 불확실한 미래조차 걱정하지 않던 시절, 남자는 이따금 여자를 위해 여자가 보는 앞에서 여자에게 들려주고자 색소폰을 연주하곤 했다. 여자가 투고한 시나리오가 탈락한 날이면 특히 더욱 정성껏. 하지만 삶이 풍족해지면서 색소폰을 불 이유가 점점 사라졌고 어느새 남자는 색소폰에 대한 열정을 완전히 잊고 있었다."},
    {t:"\"혼자서 색소폰 부는 삶을 원해? 자기도 알잖아. 감상해 줄 관객이 있어야 한다는 거. 관객도 없이 혼자 작업하고 눈에 보이는 성과도 없이 허우적대는 게 시간 갈수록 사람을 얼마나 피폐하게 만드는지 자기도 알 거 아냐. 읽히지 않는 책을 쓰고 싶어서 작가가 되려는 사람이 어디 있어. 들어주지 않는 음악을 만들려고 음악 하는 게 아니잖아. 색소폰 연주가로 무대 위에 오르고 싶었던 꿈이 자기한테도 있었잖아.\"",d:true},
    {t:"여자의 목소리는 낮고 건조했다. 하지만 가슴속에 응어리진 열기가 말 한마디 한마디에 싸늘하게 묻어 나왔다. 남자가 미세하게 떨리는 목소리로 말했다."},
    {t:"\"난 당신과 사는 게 행복해진 후로 무대에 오르고 싶다는 마음이 사라졌어.\"",d:true,hi:true},
    {t:"여자는 다시 시나리오를 쓰기 시작했다. 그러나 투고는커녕 완성조차 버거웠다. 아무리 머리를 쥐어짜도 AI가 만드는 이야기보다 별로라는 생각에 머릿속에서 검열이 일어났다. 더디게나마 원고를 완성해도 투고하기 무섭게 탈락 통보가 날아들었다. 여자는 점점 신경질적으로 변했다."},
    {t:"남자는 여자의 변화를 어려워했다. 웃음이 사라진 여자의 얼굴, 식도염이며 위염을 달고 통증에 시달리는 여자의 건강, 불면증이 만성화된 여자의 일상, 날이 갈수록 야위어가는 여자의 몸. 그 모든 것이 남자의 머리를 버겁게 했고 마음을 쓰라리게 했다. 여자는 짜증을 부릴 때마다 그 정도가 점점 심해졌다. 고성을 지르는 경우가 잦아져 결국에는 남자도 참지 못해 언성을 높였다. 그때마다 서로 사과했지만 그렇다고 여자가 무너져가는 상황 자체가 멈추는 건 아니었다."},
    {t:"궁리 끝에 남자는 케이스 속에 잠들어 있던 색소폰을 다시 꺼냈다. 여자가 집에 없는 동안 남자는 오랜만에 색소폰 연주를 시도해봤다. 그러나 두어 번 연습을 시도한 후 실망스러운 마음으로 색소폰을 내려놓았다. 형편없고 조악한 소리가 튀어나왔다. 머리는 과거처럼 연주하라고 명령했지만, 늙은 손가락은 굳어버린 뼈마디를 머리가 명령하는 속도에 맞춰 움직이지 못했다. 엉성하기 짝이 없는 소리에 남자는 고개를 가로저었다. 그러다 불현듯 남자의 머릿속에 아이디어가 떠올랐다. 안타깝게도 남자는 희망에 눈이 멀어 이게 좋은 아이디어일지 아닐지 충분히 점검하지 못했다."},
    {t:"어느 날, 여자가 현관문을 열자 색소폰 소리가 들렸다. 여자의 눈에 거실에서 색소폰 부는 남자의 모습이 보였다. 오랜만에 듣는 그의 연주에 여자는 마음 한 곳이 따스하게 녹아내렸다. 그런데 무언가 이상했다. 색소폰을 부는 남자의 모습이 어딘가 어색했다."},
    {t:"잠시 후 어색함의 정체를 알아차린 여자가 뜨악한 표정을 지었다."},
    {t:"\"지금 뭐 하는 짓이야?\"",d:true},
    {t:"남자는 색소폰을 부는 시늉만 하고 있었고, 연주 소리는 AI가 만든 것이었다. AI의 연주가 집 안에 설치된 스피커에서 흘러나오고 있었다."},
    {t:"\"이게 뭐냐고!\"",d:true},
    {t:"원래 남자는 적당한 타이밍에 진실을 밝혀 웃긴 모습을 연출하려 했다. 하지만 여자의 반응을 보고서야 남자는 깨달았다. 이건 최악의 농담이었다. 사태를 수습하기 위해 황급히 색소폰을 내려놓고 여자에게 다가가 두 손을 맞잡으며, 자신의 진심과 노력에도 불구하고 실력이 되돌아오지 않아 어쩔 수 없는 선택이었다고 다급히 변명했다."},
    {t:"남자가 변명하는 내내 여자는 연신 고개를 가로젓더니 급기야 남자의 손을 뿌리치고는 왈칵 소리 질렀다."},
    {t:"\"그만해!\"",d:true},
    {t:"여자는 거의 울 듯한 얼굴로 달아나듯 방으로 들어갔다. 남자가 따라 들어가려 했지만, 방문은 큰 소리를 내며 닫혀 버렸다."},
    {t:"남자가 소파에 웅크리고 앉아 두 손으로 머리를 싸매고 있을 동안, 여자는 침대에 누워 소리 죽여 흐느꼈다. AI가 내는 부드러운 색소폰 소리가 방 안을 흘러 다녔다."},
    {t:"잠시 시간이 지나고, 어느 정도 안정을 되찾은 여자는 눈물로 젖은 베개에 얼굴을 대고 조금 전 상황을 곰곰이 생각해 보았다. 남자에게 그렇게 반응할 필요가 있었을까? 아니다. 남자의 행동은 여자를 위한 것인가? 그렇다. 문득 여자는 자신의 행동에 남자가 상심해 있을 거란 생각이 들었다. 남자에게 사과하고 싶었다."},
    {t:"그러나 사과란 감정적인 힘이 많이 소모되는 행동이었고, 여자는 사과를 하기에는 감정적으로 지쳐 있었다. 미안한 마음과 응어리진 우울감을 모두 토로하고 싶었지만 너무 벅찬 일이었다. 망설인 끝에 여자는 남자에게 문자메시지를 전송했다. 여자의 심리 상태를 분석한 AI가 자동으로 생성한 문자메시지를.",hi:true},
    {t:"얼마 후, 남자가 보낸 장문의 문자메시지가 도착했다. 여자는 남자가 보낸 메시지의 정갈하고 차분한 느낌, 그리고 자신을 향한 섬세한 위로에 따스함을 느꼈다. 침대에서 일어나 방문을 여니, 남자가 미소를 지으며 여자를 향해 두 팔을 벌렸다. 여자는 남자의 품에 몸을 기댔고, 두 사람의 팔이 서로의 몸을 감싸 안았다. 남자의 뺨과 여자의 뺨이 맞닿은 순간 여자는 문득 깨달았다. 남자가 아까 보낸 문자메시지도 자신이 보낸 것과 마찬가지로 AI가 만들었으리라는 사실을.",hi:true},
    {t:"그 뒤로도 여자와 남자는 다툼과 화해를 반복했다. 다툼은 두 사람이 직접 벌였고 화해에는 항상 AI가 개입했다. 날카로운 말로 서로의 마음에 상처를 내고 AI가 만든 문자메시지로 흉터를 어루만졌다. 미안한 마음에 사과의 의미로 선물을 사주기도 했지만 이것 역시 AI가 추천한 물건을 구매한 거였다. 오랜만에 함께 여행을 가더라도 그들이 여행 장소를 물색한 게 아니라 AI가 제시한 최적의 장소를 찾아가는 식이었다."},
    {t:"두 사람의 사랑은 여전했다. 그러나 그 사랑은 점점 공허해졌고, 형태만 유지한 채 서서히 낙엽처럼 메말라, 굳어갔다. 그렇게 점점 화석이 되어가는 사랑을 두 사람은 은연중에 느끼고 있었다. 오가는 몸짓은 진심을 담았지만 그 모든 게 AI의 산물이었다. 서로의 귓가에 속삭이는 달콤한 말들마저 AI가 제시한 가이드를 이행하는 것에 불과했다. 서로를 향한 진심이 오히려 허상의 연쇄를 빚어내고 있었다. 두 사람은 결국 지쳐버렸고, 마침내 이혼에 합의했다."},
    {t:"먼저 이혼을 말한 건 여자였다. 그날, 남자는 생각했다. 이혼은 여자가 내린 결정이었을까, 아니면 여자의 마음을 분석한 AI가 제안한 것일까. 남자는 그 답을 구할 수 없으리라는 생각이 들었다. 창호 밖으로 기어 나가며 백기를 흔드는 초췌한 몰골의 패잔병처럼, 항복하듯 이혼 서류에 서명했다."}
  ],

},
{
  id:4,title:"다시 부는 색소폰",desc:"감정 체험 거래 시장의 탄생",range:"\"홀몸이 되었지만\" ~ \"시대가 바야흐로 시작되었다\"",
  paragraphs:[
    {t:"홀몸이 되었지만 남자의 생활에 불편함은 없었다. 집도 있고 돈도 있으며 회사에서 정기적으로 연금도 받았다. 다만 긴 시간을 함께한 사람이 떨어져 나가면서, 마음속에 공백이 생겼을 뿐이었다. 함께 나눈 시간과 함께 머문 공간, 그 모든 추억이 떨어져 나간 느낌이었다. 이따금 가슴 한 곳이 허무하게 아릴 때마다 남자는 이런 생각을 했다. 순순히 이혼에 합의해준 게 실수였을까. 덧없는 질문이었다."},
    {t:"남자는 질문 대신 언제부터인가 기억을 더듬기 시작했다. 시나리오를 쓰지 못해 눈물짓던 여자. 그 전에, 풍족한 생활에 편안해하던 두 사람. 더 전에, 가난하던 시절 여자를 위해 색소폰을 연주하던 남자 자신. 그보다도 더 전에, 서로가 고용된 대리인임을 모르고 진지하게 연기하다 뒤늦게 어색해하며 허탈하게 웃음 지었던 그날. 함께 이삿짐을 나른, 함께 살기 시작한 첫날. 비록 궁핍하지만 사랑 하나만으로 서로에게 의지하며 행복하게 색소폰을 연주하던 남자 자신의 모습."},
    {t:"생각이 여기까지 다다르자 갑자기 남자의 머릿속에 불꽃처럼 무언가가 번쩍 일었다. 남자는 방치되어 있던 색소폰을 꺼냈다. 그리고 무작정 바깥으로 나갔다."},
    {t:"도심 한복판에서 남자는 색소폰을 불었다. 얼마만의 버스킹인지 가늠할 수 없었다. 걸핏하면 음이 샜고, 얼마 불지도 않았는데 숨이 막혔다. 굳어버린 손가락이 원래의 박자를 따라잡지 못했다. 행인들은 과거에나 봤던 버스킹이 신기한 듯 눈길을 주며 지나갔다. 버스킹은 어느덧 시대의 저편으로 사라진 광경이었으니까. 남자는 주변의 시선에 아랑곳하지 않고 온 힘을 다해 집중했다."},
    {t:"삐거덕거리는 마차처럼 남자의 연주는 느리고 더디며 거칠었지만, 손가락이 하나씩 움직이면서 천천히 선율이 되었다. 투박하지만 점점 '음악'의 모습을 띠기 시작했다. 남자의 얼굴은 붉게 달아 올랐고 관자놀이에는 땀방울이 맺혔다. 마침내 연주가 끝난 순간, 남자는 색소폰에서 입을 떼며 길게 숨을 내뱉었다. 손으로 땀방울을 쓸면서 후련한 미소를 지었다.",hi:true},
    {t:"\"잘 들었어요.\"",d:true},
    {t:"가던 길을 멈추고 아까부터 남자의 연주를 바라보던 젊은이가 말했다."},
    {t:"\"요즘 같은 세상에 버스킹을 구경할 줄은 몰랐네요. 종종 이렇게 연주하시나 봐요?\"",d:true},
    {t:"그러자 남자가 손을 저었다."},
    {t:"\"젊었을 때 연주를 좀 했죠. 그때는 지금처럼 AI의 음악을 듣는 시대가 아니었거든요.\"",d:true},
    {t:"\"어렸을 때 사람이 악기 연주하는 모습을 봤던 게 기억나네요.\"",d:true},
    {t:"\"형편없죠?\"",d:true},
    {t:"\"아뇨, 아녜요. 저도 모르게 구경하게 되던걸요.\"",d:true},
    {t:"\"나이를 먹더니 손이 많이 굳었어요. 좋게 들어줘서 고마워요. 내가 괜히 시간을 뺏은 건 아닌지, 미안해지네요.\"",d:true},
    {t:"\"전혀요. 여기서 여자친구 만나기로 했는데, 괜히 일찍 나와서 시간이 많이 남았거든요.\"",d:true},
    {t:"\"사랑하는 사람과 만나기로 하셨군요.\"",d:true},
    {t:"남자의 목소리에 탄식이 스며 있었지만, 젊은이는 알아차리지 못했다. 젊은이가 웃었다. 남자가 여자와 만나기 시작한 시절에 남자가 짓던 웃음이었다. 별안간 남자의 눈빛이 바뀌었다. 갑자기 떠오른 생각이 입 밖으로 순식간에 튀어나왔다."},
    {t:"\"혹시 실례가 되지 않는다면 내가 그 자리에 함께해도 될까요? 나는 색소폰만 연주할게요. 당신과 당신 애인이 있는 자리에서 연주를 하고 싶습니다.\"",d:true},
    {t:"젊은이가 뜻밖의 상황에 무슨 일인가 싶은 표정을 지었다. 그러자 남자가 재빨리 덧붙어 말했다."},
    {t:"\"그리고 그 대가로 비용을 지불하겠습니다. 이상하게 들리겠지만 두 사람 곁에서 연주하게 해 주세요. 액수는 상관없습니다.\"",d:true},

    if(data.success){currentUser={studentId,name};await loadProgress();initApp()}
    else{errEl.textContent=data.message||'로그인에 실패했습니다.';errEl.style.display='block'}
  }catch(e){errEl.textContent='서버 연결에 실패했습니다. 잠시 후 다시 시도해주세요.';errEl.style.display='block'}
  showLoading(false);
}

// ── Firebase 진도 ──
async function loadProgress(){
  const docId=`${currentUser.studentId}_${currentUser.name}`;
  try{
    const doc=await db.collection('progress').doc(docId).get();
    if(doc.exists) progress=doc.data().sections||{};
    else progress={};
    // localStorage 임시 저장본이 Firebase보다 최신이면 병합
    try{
      [1,2,3,4,5].forEach(i=>{
        const key=`draft_${currentUser.studentId}_${i}`;
        const local=localStorage.getItem(key);
        if(local){
          const parsed=JSON.parse(local);
          const fbTime=progress[i]&&progress[i].updatedAt?new Date(progress[i].updatedAt).getTime():0;
          if(parsed.ts>fbTime&&!(progress[i]&&progress[i].done)){
            if(!progress[i])progress[i]={done:false};
            progress[i].draft=parsed.draft;
          }
        }
      });
    }catch(e){}
  }catch(e){
    // Firebase 오프라인 시 localStorage에서 복구
    progress={};
    try{
      [1,2,3,4,5].forEach(i=>{
        const key=`draft_${currentUser.studentId}_${i}`;
        const local=localStorage.getItem(key);
        if(local){
          const parsed=JSON.parse(local);
          progress[i]={done:false,draft:parsed.draft};
        }
      });
      showToast('오프라인 상태입니다. 임시 저장된 내용을 불러왔어요.','error');
    }catch(le){}
  }
}

async function saveProgress(){
  const docId=`${currentUser.studentId}_${currentUser.name}`;
  try{await db.collection('progress').doc(docId).set({studentId:currentUser.studentId,name:currentUser.name,sections:progress,updatedAt:firebase.firestore.FieldValue.serverTimestamp()})}
  catch(e){console.error('저장 실패',e)}
}

// ── 자동저장 (30초) ──
function startAutoSave(){
  // 기존 타이머 완전 해제 후 재시작 (누적 방지)
  if(autoSaveTimer){clearInterval(autoSaveTimer);autoSaveTimer=null;}
  if(draftTimer){clearTimeout(draftTimer);draftTimer=null;}
  autoSaveTimer=setInterval(()=>autoSaveDraft(),30000);
}

function stopAutoSave(){
  if(autoSaveTimer){clearInterval(autoSaveTimer);autoSaveTimer=null;}
  if(draftTimer){clearTimeout(draftTimer);draftTimer=null;}
}

async function autoSaveDraft(){
  if(!currentUser||currentSection>5)return;
  const draft=collectDraft();
  if(!draft)return;
  const badge=document.getElementById('autosaveBadge');
  badge.textContent='● 저장 중...';badge.className='autosave-badge saving';
  if(!progress[currentSection])progress[currentSection]={done:false};
  progress[currentSection].draft=draft;
  // localStorage 임시 백업 (오프라인 대비)
  try{
    const key=`draft_${currentUser.studentId}_${currentSection}`;
    localStorage.setItem(key, JSON.stringify({draft, ts:Date.now()}));
  }catch(e){}
  // Firebase 저장
  try{
    await saveProgress();
    badge.textContent='● 저장됨';badge.className='autosave-badge saved';
  }catch(e){
    // Firebase 실패 시 로컬에만 저장됐음을 표시
    badge.textContent='● 로컬 저장됨';badge.className='autosave-badge saving';
    console.warn('Firebase 저장 실패, 로컬에 임시 저장됨', e);
  }
  setTimeout(()=>{badge.textContent='● 자동저장';badge.className='autosave-badge'},2500);
}

function collectDraft(){
  const s=SECTIONS.find(x=>x.id===currentSection);
  if(!s)return null;
  const draft={};
  const sentEl=document.getElementById('sentenceInput');
  const reaEl=document.getElementById('reasonInput');
  if(!sentEl)return null;
  draft.sentence=sentEl.value;
  draft.reason=reaEl?reaEl.value:'';
  if(s.questions.b){
    s.questions.b.forEach((k,i)=>{
      const el=document.getElementById('compInput'+i);
      if(el)draft['b'+i]=el.value;
    });
  }
  if(s.questions.c){
    s.questions.c.forEach((k,i)=>{
      const el=document.getElementById('deepInput'+i);
      if(el)draft['c'+i]=el.value;
    });
  }
  return draft;
}

// ── Google Sheets 기록 ──
async function recordToSheet(sectionId,answers){
  const q=QUESTIONS[sectionId]||{};
  try{await fetch(GAS_URL,{method:'POST',body:JSON.stringify({
    type:'record',studentId:currentUser.studentId,name:currentUser.name,
    section:String(sectionId),
    impressiveSentence:answers.sentence||'',
    sentenceReason:answers.reason||'',
    b1q:q.b1||'',b1a:answers.b1a||'',
    b2q:q.b2||'',b2a:answers.b2a||'',
    c1q:q.c1||'',c1a:answers.c1a||'',
    c2q:q.c2||'',c2a:answers.c2a||''
  }),headers:{'Content-Type':'text/plain'}})}
  catch(e){console.error('시트 기록 실패',e)}
}

async function recordFinalToSheet(essay){
  const s={};
  [1,2,3,4,5].forEach(i=>{
    const p=progress[i]&&progress[i].answers||{};
    s[i]={
      sentence:p.sentence||'',reason:p.reason||'',
      b1a:p.b1a||'',b2a:p.b2a||'',
      c1a:p.c1a||'',c2a:p.c2a||''
    };
  });
  try{await fetch(GAS_URL,{method:'POST',body:JSON.stringify({
    type:'finalRecord',studentId:currentUser.studentId,name:currentUser.name,
    sections:s,essay:essay||''
  }),headers:{'Content-Type':'text/plain'}})}
  catch(e){console.error('전체기록 실패',e)}
}

// ── 앱 초기화 ──
function initApp(){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('appScreen').style.display='block';
  document.getElementById('headerStudent').textContent=`${currentUser.studentId} · ${currentUser.name}`;
  let startSection=1;
  for(let i=1;i<=5;i++){if(progress[i]&&progress[i].done)startSection=i+1;else break}
  currentSection=Math.min(startSection,5);
  if(progress['essay']&&progress['essay'].done)currentSection=6;
  startAutoSave();
  renderNav();renderContent();
}

// ── 네비게이션 ──
function renderNav(){
  const nav=document.getElementById('sectionNav');nav.innerHTML='';
  const hp=document.getElementById('headerProgress');hp.innerHTML='';
  const tabs=[...SECTIONS.map(s=>({id:s.id,label:`${s.id}부`})),{id:6,label:'감상문'}];
  tabs.forEach(tab=>{
    const done=(tab.id<=5&&progress[tab.id]&&progress[tab.id].done)||(tab.id===6&&progress['essay']&&progress['essay'].done);
    const isCurrent=tab.id===currentSection;
    const isUnlocked=tab.id===1||(tab.id<=5&&progress[tab.id-1]&&progress[tab.id-1].done)||(tab.id===6&&progress[5]&&progress[5].done);
    const t=document.createElement('div');
    t.className='section-tab'+(isCurrent?' active':'')+(done?' done':'')+((!isUnlocked&&!isCurrent)?' locked':'');
    t.textContent=tab.label;
    t.onclick=()=>{
      if(isUnlocked||done){currentSection=tab.id;renderNav();renderContent();window.scrollTo(0,0)}
      else showToast('이전 섹션을 먼저 완료해주세요.','error')
    };
    nav.appendChild(t);
    if(tab.id<=5){const dot=document.createElement('div');dot.className='progress-dot'+(done?' done':'')+(isCurrent&&!done?' current':'');hp.appendChild(dot)}
  });
}

// ── 콘텐츠 렌더 ──
function renderContent(){
  if(currentSection===6){renderEssay();return}
  const s=SECTIONS.find(x=>x.id===currentSection);
  const isUnlocked=s.id===1||(progress[s.id-1]&&progress[s.id-1].done);
  const isDone=progress[s.id]&&progress[s.id].done;
  const saved=(progress[s.id]&&progress[s.id].answers)||{};
  const draft=(progress[s.id]&&progress[s.id].draft)||{};
  // 완료 안 됐으면 draft 우선
  const val=(key)=>isDone?(saved[key]||''):(draft[key]||saved[key]||'');
  const q=QUESTIONS[s.id];
  let html='';
  html+=`<div class="section-header"><div class="section-eyebrow">섹션 ${s.id} · ${s.range}</div><div class="section-title">${s.title}</div><div class="section-desc">${s.desc}</div></div>`;
  if(!isUnlocked){html+=`<div class="locked-banner"><div class="locked-icon">🔒</div><div class="locked-text">이전 섹션을 완료하면 읽을 수 있어요.</div></div>`;document.getElementById('mainContent').innerHTML=html;return}

  // 텍스트 뷰어
  html+=`<div class="text-viewer"><div class="text-viewer-header"><div class="text-viewer-label">소설 읽기</div><div class="text-viewer-range">${s.range}</div></div><div class="text-body">`;
  let inHi=false;
  s.paragraphs.forEach(p=>{
    if(p.hi&&!inHi){html+='<div class="highlight-bar">';inHi=true}
    if(!p.hi&&inHi){html+='</div>';inHi=false}
    const cls=p.d?'dialogue':'';
    html+=`<p class="${cls}">${applyVocab(p.t)}</p>`;
  });
  if(inHi)html+='</div>';
  html+=`</div></div>`;

  // 활동 구분선
  html+=`<div class="activity-divider"><div class="activity-divider-line"></div><div class="activity-divider-label">활동하기</div><div class="activity-divider-line"></div></div>`;

  // A 활동
  html+=`<div class="activity-card">
    <div class="activity-badge"><div class="badge-letter">A</div><div class="badge-type">인상깊은 문장</div></div>
    <div class="activity-question">이 섹션에서 가장 인상깊었던 문장을 직접 옮겨 써보세요.</div>
    <div class="activity-question-sub">소설 본문에서 한 문장 또는 짧은 구절을 선택해주세요.</div>
    <textarea class="activity-textarea" id="sentenceInput" placeholder="인상깊은 문장을 입력하세요..." ${isDone?'disabled':''}>${val('sentence')}</textarea>
    <div class="activity-question" style="margin-top:20px">왜 이 문장이 인상깊었나요?</div>
    <div class="activity-question-sub">자신의 경험이나 생각과 연결해서 2~3문장으로 써보세요.</div>
    <textarea class="activity-textarea" style="min-height:90px" id="reasonInput" placeholder="이유를 써보세요..." ${isDone?'disabled':''}>${val('reason')}</textarea>
  </div>`;

  // B 활동
  if(s.questions.b){
    html+=`<div class="activity-card"><div class="activity-badge"><div class="badge-letter">B</div><div class="badge-type">내용 확인</div></div>`;
    s.questions.b.forEach((k,i)=>{
      html+=`<div class="q-item">
        <div class="q-number">질문 ${i+1}</div>
        <div class="q-text">${q[k]}</div>
        <textarea class="activity-textarea" id="compInput${i}" placeholder="질문 ${i+1}에 대한 답을 써보세요..." ${isDone?'disabled':''}>${val('b'+i)}</textarea>
      </div>`;
    });
    html+=`</div>`;
  }

  // C 활동
  if(s.questions.c){
    const cKeys=s.questions.c;
    html+=`<div class="activity-card"><div class="activity-badge"><div class="badge-letter">C</div><div class="badge-type">심화 질문</div></div>`;
    cKeys.forEach((k,i)=>{
      html+=`${i>0?'<div style="border-top:1px solid var(--paper-warm);margin:24px 0"></div>':''}
        <div class="q-number">심화${cKeys.length>1?' '+(i+1):''}</div>
        <div class="activity-question">${q[k]}</div>
        <div class="activity-question-sub">정답은 없어요. 자신의 생각을 솔직하게 써보세요.</div>
        <textarea class="activity-textarea" style="min-height:140px" id="deepInput${i}" placeholder="생각을 자유롭게 써보세요..." ${isDone?'disabled':''}>${val('c'+i)}</textarea>`;
    });
    html+=`</div>`;
  }

  // 완료/버튼
  if(isDone){
    const isLast=s.id===5;
    html+=`<div class="done-banner"><div class="done-icon">✓</div><div class="done-text"><strong>섹션 ${s.id} 완료</strong><span>${isLast?'전체 소설을 다 읽었어요! 이제 독서 감상문을 써보세요.':'다음 섹션을 이어서 읽어보세요.'}</span></div></div>`;
    html+=`<div class="submit-area"><button class="submit-btn" onclick="${isLast?'goToEssay()':'goNextSection()'}">${isLast?'독서 감상문 쓰러 가기 →':'섹션 '+(s.id+1)+'부 읽으러 가기 →'}</button></div>`;
  }else{
    html+=`<div class="submit-area"><button class="submit-btn" id="submitBtn" onclick="submitSection()">활동 완료하고 저장하기</button><div class="submit-hint">모든 칸을 채운 뒤 저장해주세요. 중간 내용은 30초마다 자동저장돼요.</div></div>`;
  }
  document.getElementById('mainContent').innerHTML=html;
}

// ── 감상문 렌더 ──
function renderEssay(){
  const isUnlocked=progress[5]&&progress[5].done;
  const isDone=progress['essay']&&progress['essay'].done;
  const saved=(progress['essay']&&progress['essay'].content)||'';
  const draft=(progress['essay']&&progress['essay'].draft)||'';
  const val=isDone?saved:(draft||saved);
  const initLen=val.length;
  const LIMIT=650;
  let html='';
  html+=`<div class="section-header"><div class="section-eyebrow">독서 감상문 · 마지막 활동</div><div class="section-title">내 마음의 독서 일지</div><div class="section-desc">소설 전체를 읽고 난 지금, 자신의 생각과 느낌을 정리해보세요.</div></div>`;
  if(!isUnlocked){
    html+=`<div class="locked-banner"><div class="locked-icon">🔒</div><div class="locked-text">소설을 모두 읽고 나면 감상문을 쓸 수 있어요.</div></div>`;
    document.getElementById('mainContent').innerHTML=html;
    return;
  }
  html+=`<div class="essay-card">
    <div class="essay-title">독서 감상문</div>
    <div class="essay-desc">
      아래 질문들을 참고해서 자유롭게 감상문을 써보세요. 꼭 모든 질문에 답하지 않아도 돼요.
      ${!isDone?`<span style="display:block;margin-top:6px;font-size:12px;color:var(--accent);font-weight:500">✏️ 최소 ${LIMIT}자 이상 작성해야 제출할 수 있어요.</span>`:''}
    </div>
    <div class="essay-prompt"><strong>참고 질문</strong>이 소설에서 가장 기억에 남는 장면이나 인물은 무엇인가요? / AI가 감정과 예술까지 대체하는 세상이 온다면 어떨 것 같나요? / 소설 속 여자와 남자의 삶에서 무엇을 배울 수 있나요? / 제목 '감정을 할인가에 판매합니다'가 나에게 주는 메시지는 무엇인가요?</div>
    <textarea class="activity-textarea" style="min-height:320px" id="essayInput" placeholder="감상문을 자유롭게 써보세요... (최소 ${LIMIT}자)" ${isDone?'disabled':''}>${val}</textarea>
    ${!isDone?`
    <div id="essayCountWrap" style="display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding:8px 12px;border-radius:3px;background:var(--paper-warm);transition:background .3s">
      <span id="essayCountMsg" style="font-size:12px;font-weight:500;color:var(--ink-muted);transition:color .3s">
        ${initLen >= LIMIT ? `✓ ${initLen}자 — 제출 가능해요!` : `현재 <strong id="essayCountNum">${initLen}</strong>자 / ${LIMIT}자 필수`}
      </span>
      <span id="essayCountBar" style="display:inline-block;width:120px;height:6px;border-radius:3px;background:var(--paper-dark);overflow:hidden;vertical-align:middle">
        <span id="essayCountFill" style="display:block;height:100%;width:${Math.min(initLen/LIMIT*100,100)}%;background:${initLen>=LIMIT?'var(--done)':'var(--accent-light)'};transition:width .2s,background .3s;border-radius:3px"></span>
      </span>
    </div>`:''}
  </div>`;
  if(isDone){
    html+=`<div class="finish-banner"><div class="finish-icon">📖</div><div class="finish-title">독서 일지 완성!</div><div class="finish-desc">소설을 끝까지 읽고 감상문까지 완성했어요.<br>수고 많았습니다.</div></div>`;
  }else{
    html+=`<div class="submit-area"><button class="submit-btn" id="essayBtn" onclick="submitEssay()" ${initLen<LIMIT?'disabled':''}>감상문 제출하기</button><div class="submit-hint">제출 후에는 수정할 수 없어요. 중간 내용은 30초마다 자동저장돼요.</div></div>`;
  }
  document.getElementById('mainContent').innerHTML=html;

  // 실시간 글자수 카운터 + 자동저장
  const essayEl=document.getElementById('essayInput');
  if(essayEl&&!isDone){
    essayEl.addEventListener('input',()=>{
      const len=essayEl.value.length;
      const pct=Math.min(len/LIMIT*100,100);
      const done=len>=LIMIT;

      // 숫자 업데이트
      const numEl=document.getElementById('essayCountNum');
      const msgEl=document.getElementById('essayCountMsg');
      const fillEl=document.getElementById('essayCountFill');
      const wrapEl=document.getElementById('essayCountWrap');
      const btn=document.getElementById('essayBtn');

      if(msgEl){
        if(done){
          msgEl.innerHTML=`✓ ${len}자 — 제출 가능해요!`;
          msgEl.style.color='var(--done)';
        } else {
          msgEl.innerHTML=`현재 <strong>${len}</strong>자 / ${LIMIT}자 필수`;
          msgEl.style.color='var(--ink-muted)';
        }
      }
      if(fillEl){
        fillEl.style.width=pct+'%';
        fillEl.style.background=done?'var(--done)':'var(--accent-light)';
      }
      if(wrapEl) wrapEl.style.background=done?'var(--done-pale)':'var(--paper-warm)';
      if(btn) btn.disabled=!done;

      // 자동저장 (30초 디바운스)
      if(draftTimer)clearTimeout(draftTimer);
      draftTimer=setTimeout(async()=>{
        if(!progress['essay'])progress['essay']={done:false};
        progress['essay'].draft=essayEl.value;
        await saveProgress();
      },30000);
    });
  }
}

// ── 섹션 제출 ──
async function submitSection(){
  const s=SECTIONS.find(x=>x.id===currentSection);
  const sentence=(document.getElementById('sentenceInput')||{}).value?.trim();
  const reason=(document.getElementById('reasonInput')||{}).value?.trim();
  if(!sentence||!reason){showToast('인상깊은 문장과 이유를 모두 입력해주세요.','error');return}
  const answers={sentence,reason};
  const sheetAnswers={sentence,reason};

  if(s.questions.b){
    for(let i=0;i<s.questions.b.length;i++){
      const v=(document.getElementById('compInput'+i)||{}).value?.trim();
      if(!v){showToast('내용 확인 질문의 답을 모두 입력해주세요.','error');return}
      answers['b'+i]=v;
      sheetAnswers['b'+(i+1)+'a']=v;
    }
  }
  if(s.questions.c){
    for(let i=0;i<s.questions.c.length;i++){
      const v=(document.getElementById('deepInput'+i)||{}).value?.trim();
      if(!v){showToast('심화 질문의 답을 입력해주세요.','error');return}
      answers['c'+i]=v;
      sheetAnswers['c'+(i+1)+'a']=v;
    }
  }

  showLoading(true);
  const btn=document.getElementById('submitBtn');
  if(btn)btn.disabled=true;

  progress[currentSection]={done:true,answers,completedAt:new Date().toISOString()};
  await saveProgress();
  await recordToSheet(currentSection,{
    sentence,reason,
    b1a:answers['b0']||'',b2a:answers['b1']||'',
    c1a:answers['c0']||'',c2a:answers['c1']||''
  });

  showLoading(false);
  showToast(`${currentSection}부 완료! 저장되었습니다.`,'success');
  renderNav();renderContent();
}

// ── 감상문 제출 ──
async function submitEssay(){
  const essay=(document.getElementById('essayInput')||{}).value?.trim();
  if(!essay||essay.length<650){showToast(`감상문을 650자 이상 작성해주세요. (현재 ${essay.length}자)`,'error');return}
  showLoading(true);
  const btn=document.getElementById('essayBtn');
  if(btn)btn.disabled=true;
  progress['essay']={done:true,content:essay,completedAt:new Date().toISOString()};
  await saveProgress();
  await recordFinalToSheet(essay);
  showLoading(false);
  showToast('감상문이 제출되었습니다! 모든 활동 완료!','success');
  renderNav();renderContent();
}

function goNextSection(){currentSection++;renderNav();renderContent();window.scrollTo(0,0)}

// ── 툴팁 토글 (전역) ──
document.addEventListener('click', function(e) {
  const vocab = e.target.closest('.vocab');
  if (vocab) {
    e.stopPropagation();
    const isActive = vocab.classList.contains('active');
    // 모든 열린 툴팁 닫기
    document.querySelectorAll('.vocab.active').forEach(v => v.classList.remove('active'));
    if (!isActive) {
      // 화면 가장자리 보정
      const rect = vocab.getBoundingClientRect();
      vocab.classList.remove('tip-left','tip-right');
      if (rect.left < 110) vocab.classList.add('tip-left');
      else if (rect.right > window.innerWidth - 110) vocab.classList.add('tip-right');
      vocab.classList.add('active');
    }
  } else {
    document.querySelectorAll('.vocab.active').forEach(v => v.classList.remove('active'));
  }
});

document.getElementById('inputName').addEventListener('keypress',e=>{if(e.key==='Enter')doLogin()});
